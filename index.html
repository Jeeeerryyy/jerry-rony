<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저희 결혼합니다</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* 폰트 설정 (나중에 변경 가능) */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Serif KR', serif; }
        .swiper { width: 100%; height: 400px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <section class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col items-center pt-20 px-6">
        <h2 class="text-sm tracking-widest text-stone-400 mb-4 uppercase">Save the Date</h2>
        <h1 class="text-3xl font-light mb-8">태윤 & 선</h1>
        
        <div id="d-day" class="text-xl font-light text-stone-600 mb-10">
            D-Day 계산 중...
        </div>

        <div class="swiper mySwiper rounded-lg overflow-hidden mb-12">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://via.placeholder.com/600x800?text=Photo+1" alt="웨딩사진 1"></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/600x800?text=Photo+2" alt="웨딩사진 2"></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/600x800?text=Photo+3" alt="웨딩사진 3"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="w-full space-y-4 mb-12">
            <div class="bg-stone-50 p-4 rounded-lg flex justify-between items-center">
                <span class="text-sm">신랑측 계좌번호</span>
                <button onclick="copyText('123-456-7890123')" class="text-xs bg-stone-200 px-3 py-1 rounded">복사</button>
            </div>
            <div class="bg-stone-50 p-4 rounded-lg flex justify-between items-center">
                <span class="text-sm">청첩장 링크 공유</span>
                <button onclick="copyLink()" class="text-xs bg-stone-800 text-white px-3 py-1 rounded">링크복사</button>
            </div>
        </div>

        <div class="w-full grid grid-cols-2 gap-4 mb-20">
            <a href="https://map.kakao.com/" target="_blank" class="bg-yellow-400 text-center py-3 rounded-lg text-sm font-bold">카카오맵</a>
            <a href="https://map.naver.com/" target="_blank" class="bg-green-500 text-white text-center py-3 rounded-lg text-sm font-bold">네이버맵</a>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // 1. 이미지 슬라이더 초기화
        var swiper = new Swiper(".mySwiper", {
            pagination: { el: ".swiper-pagination", clickable: true },
            autoplay: { delay: 3000 },
            loop: true
        });

        // 2. D-Day 계산 (예시 날짜: 2026-10-24)
        function updateDDay() {
            const targetDate = new Date("2026-10-24T00:00:00").getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("d-day").innerText = days > 0 ? `D-${days}` : (days === 0 ? "Today is the Day!" : "Married");
        }
        updateDDay();

        // 3. 텍스트 복사 기능
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("계좌번호가 복사되었습니다.");
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("청첩장 링크가 복사되었습니다.");
            });
        }
    </script>
</body>
</html>
